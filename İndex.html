<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sora Filigransız Çekici - Kral Versiyon</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
    .container { max-width: 700px; margin: 40px auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,255,200,0.2); }
    h1 { text-align: center; color: #0ff; margin-bottom: 30px; }
    input { width: 100%; padding: 15px; font-size: 16px; background: #333; color: #fff; border: 2px solid #0ff; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
    button { width: 100%; padding: 15px; font-size: 18px; background: #0ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0cc; }
    button:disabled { background: #555; cursor: not-allowed; }
    #result { margin-top: 30px; padding: 20px; background: #0a3; border-radius: 8px; word-break: break-all; display: none; }
    #result a { color: #0ff; text-decoration: none; font-size: 1.1em; }
    #error { margin-top: 20px; color: #f44; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sora Filigransız Link Çek (Kral Edition)</h1>
    
    <input type="url" id="soraUrl" placeholder="https://sora.chatgpt.com/p/s_..." required autofocus />
    <button id="btn">Filigransız Raw Linki Çek!</button>

    <div id="result">
      <strong>Filigransız Video (videos.openai.com raw):</strong><br>
      <a id="link" href="#" target="_blank" download></a>
      <p><small>Sağ tık → "Bağlantıyı farklı kaydet" ile MP4 olarak indir. Link süresi sınırlı (genelde 1-4 hafta).</small></p>
    </div>

    <div id="error"></div>
  </div>

  <script>
    const input = document.getElementById('soraUrl');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    const linkEl = document.getElementById('link');
    const errEl = document.getElementById('error');

    // CORS proxy (allorigins.win stabil, alternatif: https://corsproxy.io/? )
    const proxy = 'https://api.allorigins.win/raw?url=';

    btn.addEventListener('click', async () => {
      errEl.textContent = '';
      result.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Çekiliyor... Bekle';

      let url = input.value.trim();
      if (!url || !url.includes('sora.chatgpt.com/p/')) {
        errEl.textContent = 'Geçerli Sora linki gir (sora.chatgpt.com/p/ ile başlayan)';
        resetBtn();
        return;
      }

      try {
        const proxyUrl = proxy + encodeURIComponent(url);
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error('Proxy hatası: ' + res.status);

        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        let src = null;
        const video = doc.querySelector('video');
        if (video) src = video.src || video.querySelector('source')?.src;

        if (!src) {
          // Bazı durumlarda data-src veya başka attribute
          src = doc.querySelector('video')?.getAttribute('data-src') ||
                doc.querySelector('[type="video/mp4"]')?.src;
        }

        if (src) {
          // Relative → absolute yap
          if (src.startsWith('/')) src = 'https://sora.chatgpt.com' + src;
          // Bazen videos.openai.com/az/files/.../raw? ile geliyor, direkt temiz

          linkEl.href = src;
          linkEl.textContent = src;
          result.style.display = 'block';
        } else {
          errEl.textContent = 'Video src bulunamadı. Sayfa değişmiş olabilir veya proxy başarısız.';
        }
      } catch (e) {
        errEl.textContent = 'Hata: ' + e.message + ' (Proxy ölü olabilir, alternatif dene)';
      }

      resetBtn();
    });

    function resetBtn() {
      btn.disabled = false;
      btn.textContent = 'Filigransız Raw Linki Çek!';
    }

    input.addEventListener('keypress', e => { if (e.key === 'Enter') btn.click(); });
  </script>

</body>
</html>
